name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Detect root package.json
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::notice::No root package.json — skipping npm steps. CI still passes."
          fi

      - name: Install dependencies
        if: steps.detect.outputs.exists == 'true'
        run: |
          if [ -f package-lock.json ]; then
            npm ci || npm install --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi
        continue-on-error: true

      - name: Lint (informational)
        if: steps.detect.outputs.exists == 'true'
        run: npm run lint --if-present
        continue-on-error: true

      - name: Test (informational)
        if: steps.detect.outputs.exists == 'true'
        run: npm test --if-present
        continue-on-error: true

      - name: Build (informational)
        if: steps.detect.outputs.exists == 'true'
        run: npm run build --if-present
        continue-on-error: true

      - name: CI summary
        run: echo "::notice::CI run completed. Lint/Test/Build steps are informational and do not fail the job."
